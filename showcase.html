<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSFleet Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      /* Grey (from Figma variables) */
      --grey-00:  #ffffff; --grey-05:  #f7f7f8; --grey-10: #f1f1f2;
      --grey-20:  #e6e6e7; --grey-30:  #d8d8da; --grey-40: #c0c2c6;
      --grey-50:  #b0b2b7; --grey-60:  #9c9ea3; --grey-70: #6f7176;
      --grey-80:  #5d6065; --grey-90:  #36383b; --grey-100: #1f2124;

      /* Azure Blue */
      --blue-azure-10: #e8f6ff; --blue-azure-20: #d7eff9;
      --blue-azure-30: #b3e1f7; --blue-azure-40: #61bde9;
      --blue-azure-50: #39ade3; --blue-azure-60: #138cc4;
      --blue-azure-70: #0a74a6; --blue-azure-80: #0369a1;
      --blue-azure-90: #075985; --blue-azure-100: #013b57;

      /* Vivid Blue */
      --blue-vivid-10: #e5f0fe; --blue-vivid-20: #b2d3ff;
      --blue-vivid-30: #7cb4ff; --blue-vivid-40: #5ba1ff;
      --blue-vivid-50: #4490f6; --blue-vivid-60: #227df8;
      --blue-vivid-70: #0068f4; --blue-vivid-80: #065cd1;
      --blue-vivid-90: #0f4082; --blue-vivid-100: #072e63;

      /* Red */
      --red-10: #fef2f2; --red-20: #fee2e2; --red-30: #fecaca;
      --red-40: #fca5a5; --red-50: #f87171; --red-60: #f94144;
      --red-70: #dc2626; --red-80: #b91c1c; --red-90: #991b1b; --red-100: #781212;

      /* Green */
      --green-10: #f1fcf2; --green-20: #e2f8e5; --green-30: #c5f2cb;
      --green-40: #a8ebb2; --green-50: #8be598; --green-60: #64d074;
      --green-70: #59b767; --green-80: #469852; --green-90: #247a31; --green-100: #12591c;

      /* Yellow */
      --yellow-10: #fff6d7; --yellow-20: #ffeec7; --yellow-30: #fde9b9;
      --yellow-40: #fbdd95; --yellow-50: #ffd164; --yellow-60: #f9c74f;
      --yellow-70: #eab308; --yellow-80: #d6a201; --yellow-90: #be9103; --yellow-100: #927302;

      /* Orange */
      --orange-05: #fcf9f5;
      --orange-10: #fff0e6; --orange-20: #ffe2cc; --orange-30: #ffc49a;
      --orange-40: #ffa767; --orange-50: #ff8935; --orange-60: #ff6c02;
      --orange-70: #e66304; --orange-80: #d15801; --orange-90: #aa381a; --orange-100: #702822;

      /* Indigo */
      --indigo-10: #f1ecff; --indigo-20: #e4daff; --indigo-30: #d8c8ff;
      --indigo-40: #bea3fd; --indigo-50: #a078fb; --indigo-60: #8251f4;
      --indigo-70: #6a3fc8; --indigo-80: #553698; --indigo-90: #02005f; --indigo-100: #010028;

      /* Pink */
      --pink-10: #fff3fa; --pink-20: #f8e3ee; --pink-30: #f7d3e1;
      --pink-40: #f8b0cd; --pink-50: #f085c0; --pink-60: #df4e9d;
      --pink-70: #d22483; --pink-80: #be2478; --pink-90: #a01f65; --pink-100: #5e1640;

      /* Button tokens */
      --btn-primary-bg:           #010028;
      --btn-primary-hover:        var(--grey-80);
      --btn-primary-focus-bg:     var(--grey-80);
      --btn-primary-active-bg:    var(--grey-80);
      --btn-primary-ring-focus:   var(--blue-azure-30);
      --btn-primary-ring-active:  var(--blue-azure-40);
      --btn-primary-text:         #ffffff;

      --btn-secondary-bg:               var(--grey-00);
      --btn-secondary-hover-bg:         var(--grey-10);
      --btn-secondary-focus-bg:         var(--grey-10);
      --btn-secondary-active-bg:        var(--grey-10);
      --btn-secondary-text:             var(--grey-90);
      --btn-secondary-border:           var(--grey-80);
      --btn-secondary-border-hover:     var(--grey-90);
      --btn-secondary-ring-focus:       var(--blue-azure-30);
      --btn-secondary-ring-active:      var(--blue-azure-40);
      --btn-secondary-disabled-border:  var(--grey-20);

      --btn-tertiary-bg:          transparent;
      --btn-tertiary-hover-bg:    var(--grey-10);
      --btn-tertiary-focus-bg:    var(--grey-10);
      --btn-tertiary-active-bg:   var(--grey-20);
      --btn-tertiary-text:        var(--grey-80);
      --btn-tertiary-focus-text:  var(--grey-90);
      --btn-tertiary-active-text: var(--grey-90);
      --btn-tertiary-border:      var(--grey-30);
      --btn-tertiary-ring-focus:  var(--blue-azure-30);
      --btn-tertiary-ring-active: var(--blue-azure-40);

      --btn-quiet-bg:           transparent;
      --btn-quiet-hover-bg:     var(--grey-20);
      --btn-quiet-focus-bg:     var(--grey-10);
      --btn-quiet-active-bg:    var(--grey-20);
      --btn-quiet-text:         var(--grey-80);
      --btn-quiet-hover-text:   var(--grey-90);
      --btn-quiet-focus-text:   var(--grey-90);
      --btn-quiet-active-text:  var(--grey-90);
      --btn-quiet-ring-focus:   var(--blue-azure-30);
      --btn-quiet-ring-active:  var(--blue-azure-40);

      --btn-danger-bg:          var(--red-70);
      --btn-danger-hover-bg:    var(--red-80);
      --btn-danger-focus-bg:    var(--red-60);
      --btn-danger-active-bg:   var(--red-70);
      --btn-danger-text:        #ffffff;
      --btn-danger-ring-focus:  var(--red-40);
      --btn-danger-ring-active: var(--red-50);

      --btn-disabled-bg:   var(--grey-10);
      --btn-disabled-text: var(--grey-50);

      --btn-height-xl: 56px; --btn-height-md: 40px;
      --btn-height-sm: 36px; --btn-height-xs: 32px;
      --btn-radius: 4px;
      --btn-font-size: 14px; --btn-line-height: 16px; --btn-font-weight: 500;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: var(--grey-05); color: var(--grey-90); -webkit-font-smoothing: antialiased; }

    /* ─── Button styles ──────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Roboto', sans-serif; font-size: var(--btn-font-size); font-weight: var(--btn-font-weight); line-height: var(--btn-line-height); white-space: nowrap; text-decoration: none; border: none; border-radius: var(--btn-radius); cursor: pointer; user-select: none; outline: none; box-shadow: none; transition: background-color 120ms ease, color 120ms ease, box-shadow 120ms ease; }
    .btn:disabled, .btn.is-disabled { cursor: not-allowed; pointer-events: none; }
    .btn .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; width: 16px; height: 16px; }
    .btn-xl { height: var(--btn-height-xl); padding: 0 20px; } .btn-xl .icon { width: 20px; height: 20px; }
    .btn-md { height: var(--btn-height-md); padding: 10px 12px; }
    .btn-sm { height: var(--btn-height-sm); padding: 8px 12px; }
    .btn-xs { height: var(--btn-height-xs); padding: 6px 10px; gap: 4px; } .btn-xs .icon { width: 14px; height: 14px; }

    .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-text); }
    .btn-primary:hover:not(:disabled):not(.is-disabled), .btn-primary.is-hover { background: var(--btn-primary-hover); }
    .btn-primary:focus:not(:disabled):not(.is-disabled), .btn-primary.is-focus { background: var(--btn-primary-focus-bg); box-shadow: inset 0 0 0 3px var(--btn-primary-ring-focus); }
    .btn-primary:active:not(:disabled):not(.is-disabled), .btn-primary.is-active { background: var(--btn-primary-active-bg); box-shadow: inset 0 0 0 3px var(--btn-primary-ring-active); }
    .btn-primary:disabled, .btn-primary.is-disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); }

    .btn-secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); box-shadow: inset 0 0 0 1px var(--btn-secondary-border); }
    .btn-secondary:hover:not(:disabled):not(.is-disabled), .btn-secondary.is-hover { background: var(--btn-secondary-hover-bg); box-shadow: inset 0 0 0 1px var(--btn-secondary-border-hover); }
    .btn-secondary:focus:not(:disabled):not(.is-disabled), .btn-secondary.is-focus { background: var(--btn-secondary-focus-bg); box-shadow: inset 0 0 0 3px var(--btn-secondary-ring-focus); }
    .btn-secondary:active:not(:disabled):not(.is-disabled), .btn-secondary.is-active { background: var(--btn-secondary-active-bg); box-shadow: inset 0 0 0 3px var(--btn-secondary-ring-active); }
    .btn-secondary:disabled, .btn-secondary.is-disabled { background: var(--btn-secondary-bg); color: var(--btn-disabled-text); box-shadow: inset 0 0 0 1px var(--btn-secondary-disabled-border); }

    .btn-tertiary { background: var(--btn-tertiary-bg); color: var(--btn-tertiary-text); box-shadow: inset 0 0 0 1px var(--btn-tertiary-border); }
    .btn-tertiary:hover:not(:disabled):not(.is-disabled), .btn-tertiary.is-hover { background: var(--btn-tertiary-hover-bg); }
    .btn-tertiary:focus:not(:disabled):not(.is-disabled), .btn-tertiary.is-focus { background: var(--btn-tertiary-focus-bg); color: var(--btn-tertiary-focus-text); box-shadow: inset 0 0 0 3px var(--btn-tertiary-ring-focus); }
    .btn-tertiary:active:not(:disabled):not(.is-disabled), .btn-tertiary.is-active { background: var(--btn-tertiary-active-bg); color: var(--btn-tertiary-active-text); box-shadow: inset 0 0 0 3px var(--btn-tertiary-ring-active); }
    .btn-tertiary:disabled, .btn-tertiary.is-disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); box-shadow: inset 0 0 0 1px var(--grey-20); }

    .btn-quiet { background: var(--btn-quiet-bg); color: var(--btn-quiet-text); }
    .btn-quiet.btn-md { padding-top: 8px; padding-bottom: 8px; }
    .btn-quiet.btn-sm { padding-top: 6px; padding-bottom: 6px; }
    .btn-quiet:hover:not(:disabled):not(.is-disabled), .btn-quiet.is-hover { background: var(--btn-quiet-hover-bg); color: var(--btn-quiet-hover-text); }
    .btn-quiet:focus:not(:disabled):not(.is-disabled), .btn-quiet.is-focus { background: var(--btn-quiet-focus-bg); color: var(--btn-quiet-focus-text); box-shadow: inset 0 0 0 3px var(--btn-quiet-ring-focus); }
    .btn-quiet:active:not(:disabled):not(.is-disabled), .btn-quiet.is-active { background: var(--btn-quiet-active-bg); color: var(--btn-quiet-active-text); box-shadow: inset 0 0 0 3px var(--btn-quiet-ring-active); }
    .btn-quiet:disabled, .btn-quiet.is-disabled { background: transparent; color: var(--btn-disabled-text); }

    .btn-danger { background: var(--btn-danger-bg); color: var(--btn-danger-text); }
    .btn-danger:hover:not(:disabled):not(.is-disabled), .btn-danger.is-hover { background: var(--btn-danger-hover-bg); }
    .btn-danger:focus:not(:disabled):not(.is-disabled), .btn-danger.is-focus { background: var(--btn-danger-focus-bg); box-shadow: inset 0 0 0 3px var(--btn-danger-ring-focus); }
    .btn-danger:active:not(:disabled):not(.is-disabled), .btn-danger.is-active { background: var(--btn-danger-active-bg); box-shadow: inset 0 0 0 3px var(--btn-danger-ring-active); }
    .btn-danger:disabled, .btn-danger.is-disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); }

    /* ─── Layout ─────────────────────────────────────────────── */
    .page { min-height: 100vh; background: var(--grey-05); }
    header { background: #010028; color: #fff; padding: 0 40px; height: 56px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1400px; margin: 0 auto; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; }
    .logo span { color: #39ade3; }
    .header-divider { color: #5d6065; }
    .header-sub { font-size: 14px; color: #b0b2b7; }
    .badge { font-size: 11px; font-weight: 600; color: #b0b2b7; background: rgba(255,255,255,.08); padding: 3px 8px; border-radius: 20px; }

    /* ─── App shell ─────────────────────────────────────────── */
    .app-body { display: flex; flex: 1; min-height: 0; }

    /* ─── Sidebar ────────────────────────────────────────────── */
    .ds-sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid var(--grey-20);
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .ds-sidebar-group { padding: 20px 0 4px; }
    .ds-sidebar-group + .ds-sidebar-group { border-top: 1px solid var(--grey-10); }

    .ds-sidebar-group-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--grey-50);
      padding: 0 16px 6px;
    }

    .ds-sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 400;
      color: var(--grey-70);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Roboto', sans-serif;
      transition: background 100ms, color 100ms;
      position: relative;
    }

    .ds-sidebar-item:hover { background: var(--grey-05); color: var(--grey-90); }

    .ds-sidebar-item.active {
      background: var(--blue-azure-10);
      color: var(--blue-azure-80);
      font-weight: 500;
    }

    .ds-sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--blue-azure-70);
      border-radius: 0 2px 2px 0;
    }

    /* ─── Content ────────────────────────────────────────────── */
    .ds-content { flex: 1; min-width: 0; background: var(--grey-05); overflow-y: auto; }
    .ds-main { max-width: 1400px; margin: 0 auto; padding: 48px 40px 80px; display: flex; flex-direction: column; gap: 56px; }
    .section { display: flex; flex-direction: column; gap: 20px; }
    .ds-h1 { font-size: 32px; font-weight: 700; color: var(--grey-100); line-height: 1.1; }
    .ds-h2 { font-size: 20px; font-weight: 600; color: var(--grey-90); }
    .ds-lead { font-size: 16px; color: var(--grey-70); margin-top: -8px; }
    .ds-body { font-size: 14px; color: var(--grey-70); line-height: 1.6; }
    code { font-size: 12px; background: var(--grey-10); border: 1px solid var(--grey-30); padding: 2px 6px; border-radius: 3px; font-family: 'SFMono-Regular', 'Consolas', monospace; color: var(--grey-90); }

    /* ─── States table ───────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--grey-20); }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
    thead th { background: var(--grey-05); border-bottom: 1px solid var(--grey-20); padding: 12px 20px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--grey-70); white-space: nowrap; }
    tbody td { padding: 16px 20px; border-bottom: 1px solid var(--grey-10); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover > td { background: var(--grey-05); }
    .variant-label strong { display: block; font-size: 13px; font-weight: 600; color: var(--grey-90); margin-bottom: 3px; }
    .variant-label span { display: block; font-size: 12px; color: var(--grey-60); line-height: 1.4; }

    /* ─── Sizes ──────────────────────────────────────────────── */
    .sizes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .size-card { background: #fff; border: 1px solid var(--grey-20); border-radius: 8px; padding: 20px; }
    .size-card-title { font-size: 12px; font-weight: 600; color: var(--grey-70); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
    .size-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
    .size-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .size-label { font-size: 11px; color: var(--grey-60); white-space: nowrap; }

    /* ─── Icons ──────────────────────────────────────────────── */
    .icon-grid { background: #fff; border: 1px solid var(--grey-20); border-radius: 8px; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    .icon-group-label { font-size: 12px; font-weight: 600; color: var(--grey-70); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .icon-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }

    /* ─── Examples ───────────────────────────────────────────── */
    .examples-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
    .example-card { background: #fff; border: 1px solid var(--grey-20); border-radius: 8px; overflow: hidden; }
    .example-label { font-size: 11px; font-weight: 600; color: var(--grey-60); text-transform: uppercase; letter-spacing: .07em; padding: 10px 16px; background: var(--grey-05); border-bottom: 1px solid var(--grey-20); }
    .example-body { padding: 24px 16px; }
    .btn-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-group-right { justify-content: flex-end; }

    /* ─── Token card ─────────────────────────────────────────── */
    .token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
    .token-card { background: #fff; border: 1px solid var(--grey-20); border-radius: 8px; overflow: hidden; }
    .token-card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--grey-70); padding: 12px 16px; background: var(--grey-05); border-bottom: 1px solid var(--grey-20); }
    .token-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .token-table th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--grey-60); font-weight: 600; border-bottom: 1px solid var(--grey-10); background: none; }
    .token-table td { padding: 8px 12px; border-bottom: 1px solid var(--grey-10); vertical-align: middle; color: var(--grey-80); }
    .token-table tr:last-child td { border-bottom: none; }
    .swatch-inline { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }

    /* ─── Colors page ────────────────────────────────────────── */
    .primary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .primary-swatch { border-radius: 8px; padding: 20px; min-height: 128px; display: flex; flex-direction: column; justify-content: flex-end; gap: 3px; border: 1px solid rgba(0,0,0,0.07); }
    .ps-label { font-size: 13px; font-weight: 600; }
    .ps-hex { font-size: 12px; font-family: 'SFMono-Regular', 'Consolas', monospace; }
    .ps-token { font-size: 11px; font-family: 'SFMono-Regular', 'Consolas', monospace; opacity: 0.6; }

    .palettes-list { display: flex; flex-direction: column; gap: 24px; }
    .palette-row { display: flex; flex-direction: column; gap: 8px; }
    .palette-header { display: flex; align-items: baseline; gap: 10px; }
    .palette-name { font-size: 14px; font-weight: 600; color: var(--grey-90); }
    .palette-tag { font-size: 11px; font-weight: 500; color: var(--grey-60); background: var(--grey-10); border: 1px solid var(--grey-20); border-radius: 3px; padding: 1px 6px; }
    .palette-desc { font-size: 12px; color: var(--grey-60); }

    .palette-strip { display: flex; border-radius: 8px; overflow: hidden; height: 88px; border: 1px solid rgba(0,0,0,0.06); }
    .palette-swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 6px; transition: flex 0.15s ease; cursor: default; }
    .palette-swatch:hover { flex: 2.8; }
    .sw-stop { font-size: 11px; font-weight: 600; line-height: 1; margin-bottom: 4px; font-family: 'SFMono-Regular', 'Consolas', monospace; }
    .sw-hex { font-size: 10px; line-height: 1; font-family: 'SFMono-Regular', 'Consolas', monospace; opacity: 0; transition: opacity 0.12s; white-space: nowrap; }
    .palette-swatch:hover .sw-hex { opacity: 1; }

    .color-token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .stop-swatch { display: inline-block; width: 20px; height: 20px; border-radius: 4px; vertical-align: middle; margin-right: 8px; border: 1px solid rgba(0,0,0,0.07); flex-shrink: 0; }
    .mono { font-family: 'SFMono-Regular', 'Consolas', monospace; }

    /* ─── Icons page ─────────────────────────────────────────── */
    .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 4px; }
    .icon-card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 16px 8px 12px; background: #fff; border: 1px solid var(--grey-20); border-radius: 8px; cursor: pointer; transition: background 120ms, border-color 120ms, transform 80ms; font-family: 'Roboto', sans-serif; overflow: hidden; }
    .icon-card:hover { background: var(--grey-05); border-color: var(--grey-40); }
    .icon-card:active { transform: scale(0.97); }
    .icon-card.copied { background: var(--blue-azure-10); border-color: var(--blue-azure-40); }
    .icon-previews { display: flex; align-items: flex-end; gap: 6px; color: var(--grey-90); }
    .icon-card.copied .icon-previews { color: var(--blue-azure-70); }
    .icon-name { font-size: 11px; color: var(--grey-60); text-align: center; line-height: 1.3; word-break: break-word; }
    .icon-card.copied .icon-name { color: var(--blue-azure-70); }

  const g = parseInt(hex.slice(3, 5), 16)
  const b = parseInt(hex.slice(5, 7), 16)
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.50
}

/* ─── AppButton ──────────────────────────────────────────────── */
const AppButton = defineComponent({
  name: 'AppButton',
  props: {
    variant:     { type: String, default: 'primary' },
    size:        { type: String, default: 'md' },
    disabled:    { type: Boolean, default: false },
    as:          { type: String, default: 'button' },
    forcedState: { type: String, default: null },
    ariaLabel:   { type: String, default: null },
  },
  setup(props, { slots }) {
    return () => {
      const isDisabled = props.disabled || props.forcedState === 'disabled'
      const cls = ['btn', `btn-${props.variant}`, `btn-${props.size}`, props.forcedState ? `is-${props.forcedState}` : null].filter(Boolean).join(' ')
      const children = []
      if (slots['icon-left'])  children.push(h('span', { class: 'icon' }, slots['icon-left']()))
      if (slots.default)       children.push(h('span', slots.default()))
      if (slots['icon-right']) children.push(h('span', { class: 'icon' }, slots['icon-right']()))
      return h(props.as, {
        class: cls,
        disabled: props.as === 'button' ? isDisabled : undefined,
        'aria-disabled': props.as !== 'button' ? isDisabled : undefined,
        'aria-label': props.ariaLabel,

    }

})

const MP_TYPES = [

const MP_SIZES    = [{id:'sm',px:24,label:'SM',desc:'24 px'},{id:'md',px:32,label:'MD',desc:'32 px · default'},{id:'lg',px:48,label:'LG',desc:'48 px'},{id:'xl',px:64,label:'XL',desc:'64 px'}]

const MP_ACTIVITIES = [
  { id:'driving',   label:'Driving' },  { id:'idling',    label:'Idling' },
  { id:'parked',    label:'Parked' },   { id:'engine-on', label:'Engine On' },
  { id:'off',       label:'Off' },      { id:'rest',      label:'Rest' },
  { id:'other-work',label:'Other Work'},{ id:'resting',   label:'Resting' },
]

const IconsPage = defineComponent({
  name: 'IconsPage',
  setup() {
    const copiedId        = ref(null)
    const copiedPointerId = ref(null)
    function paths(icon) { return Array.isArray(icon.d) ? icon.d : [icon.d] }
    function copyIcon(icon) {
      const ps = paths(icon).map(d => '<path d="'+d+'"/>').join('')
      navigator.clipboard.writeText('<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">'+ps+'</svg>')
      copiedId.value = icon.name; setTimeout(() => { copiedId.value = null }, 1400)
    }
    function actContent(aid, fg) {
      if (aid==='driving')    return '<path d="M16 9L21.5 23L16 19L10.5 23Z" fill="'+fg+'"/>'
      if (aid==='idling')     return '<rect x="11.5" y="12" width="3" height="8" rx="0.5" fill="'+fg+'"/><rect x="17.5" y="12" width="3" height="8" rx="0.5" fill="'+fg+'"/>'
      if (aid==='parked')     return '<text x="16" y="21.5" text-anchor="middle" font-size="12" font-weight="700" fill="'+fg+'" font-family="Roboto,sans-serif">P</text>'
      if (aid==='engine-on')  return '<circle cx="16" cy="16" r="4.5" fill="'+fg+'"/>'
      if (aid==='off')        return '<line x1="12" y1="16" x2="20" y2="16" stroke="'+fg+'" stroke-width="2.5" stroke-linecap="round"/>'
      if (aid==='rest')       return '<path d="M17.5 11a5.5 5.5 0 1 1-5 9.5 7 7 0 0 0 5-9.5z" fill="'+fg+'"/>'
      if (aid==='other-work') return '<path d="M9 14.5h14v5.5H9z M13 14.5v-1.5a1.5 1.5 0 0 1 3 0v1.5" stroke="'+fg+'" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>'
      if (aid==='resting')    return '<path d="M11 14h5l-4 4h5M13.5 11h4l-3.5 4h4" stroke="'+fg+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>'
      return ''
    }
    function makePointerSvg(type, opts) {
      opts = opts || {}
      const sa = type.stroke ? ' stroke="'+type.stroke+'" stroke-width="1.5"' : ''
      const ov = type.overlay ? '<circle cx="16" cy="16" r="10" fill="'+type.overlay+'"/>' : ''
      const gn = type.generic ? '<circle cx="16" cy="16" r="7" fill="#b0b2b7"/>' : ''
      let c = ''
      if (opts.pointer==='yes-number') c = '<text x="16" y="20.5" text-anchor="middle" font-size="11" font-weight="700" fill="'+type.fg+'" font-family="Roboto,sans-serif">'+(opts.number||12)+'</text>'
      else if (opts.pointer==='yes-symbol' && opts.activity) c = actContent(opts.activity, type.fg)
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"><circle cx="16" cy="16" r="13" fill="'+type.fill+'"'+sa+'/>'+ov+gn+c+'</svg>'
    }
    function copyPointer(key, svgStr) {
      navigator.clipboard.writeText(svgStr)
      copiedPointerId.value = key; setTimeout(() => { copiedPointerId.value = null }, 1400)
    }
    const total = ICON_GROUPS.reduce((s, g) => s + g.icons.length, 0)
    return { groups:ICON_GROUPS, copiedId, paths, copyIcon,
             MP_TYPES, MP_SIZES, MP_STATES, MP_ACTIVITIES,
             copiedPointerId, copyPointer, makePointerSvg, actContent, total }
